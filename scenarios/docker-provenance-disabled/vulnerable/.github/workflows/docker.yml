name: Docker Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # VULNERABLE: provenance disabled -- no SLSA attestation
      # Users cannot verify the image was built from claimed source
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: myorg/agent-gateway:latest
          provenance: false
          sbom: false
